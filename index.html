<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FinançaAI | Assistente Financeiro Municipal</title>
    <link rel="stylesheet" href="assets/styles.css">
    
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn-icons-png.flaticon.com/512/3135/3135717.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn-icons-png.flaticon.com/512/3135/3135717.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135717.png" />
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135717.png" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Sidebar (histórico de conversas) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-chart-line"></i>
            <h2>FinançaAI</h2>
        </div>
        
        <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i>
            <span>Nova conversa</span>
        </button>
        
        <div class="chat-history">
            <div class="history-header">
                <i class="fas fa-clock"></i>
                <span>Conversas recentes</span>
            </div>
            <div id="historyList"></div>
        </div>
        
        <div class="sidebar-footer">
            <div class="info-item">
                <i class="fas fa-database"></i>
                <span>Base: SNC-AP</span>
            </div>
            <div class="info-item">
                <i class="fas fa-lock"></i>
                <span>Dados seguros</span>
            </div>
        </div>
    </aside>

    <!-- Botão toggle para mobile -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">
        <header class="chat-header">
            <div class="header-left">
                <h1>Assistente de Contabilidade Municipal</h1>
                <div class="badge">
                    <i class="fas fa-check-circle"></i>
                    <span>SNC-AP | Online</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="clearChatBtn" title="Limpar conversa">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button class="header-btn" id="exportChatBtn" title="Exportar conversa">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </header>

        <div id="chat-container" class="chat-container">
            <div class="welcome-message">
                <div class="welcome-icon">
                    <i class="fas fa-calculator"></i>
                </div>
                <h2>Bem-vindo ao FinançaAI</h2>
                <p>O seu assistente especializado em contabilidade municipal e SNC-AP</p>
                <div class="suggestions">
                    <button class="suggestion-btn" data-question="Como registar uma despesa municipal?">
                        <i class="fas fa-receipt"></i>
                        Como registar uma despesa municipal?
                    </button>
                    <button class="suggestion-btn" data-question="Explique o plano de contas SNC-AP">
                        <i class="fas fa-chart-pie"></i>
                        Explique o plano de contas SNC-AP
                    </button>
                    <button class="suggestion-btn" data-question="O que é o controlo interno na administração local?">
                        <i class="fas fa-shield-alt"></i>
                        O que é o controlo interno?
                    </button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="mensagem-input" 
                    placeholder="Faça uma pergunta sobre contabilidade municipal..." 
                    rows="1"
                ></textarea>
                <button id="enviar-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-footer">
                <span class="typing-indicator" id="typingIndicator">
                    <i class="fas fa-robot"></i>
                    <span>FinançaAI está a processar...</span>
                </span>
                <span class="input-note">
                    <i class="fas fa-keyboard"></i>
                    Enter para enviar · Shift+Enter para nova linha
                </span>
            </div>
        </div>
    </main>

    <script src="assets/script.js"></script>
</body>
</html>
